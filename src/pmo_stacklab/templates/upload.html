<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMO StackLab | Upload</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <h1>Upload</h1>
    <nav id="navbar"></nav>
    <div class="content">
        <div class="config-column">
            <!-- One file input per frame role; the field names match the
                 /api/upload multipart fields. Each carries an info tip. -->
            <form id="upload-form" class="config-menu">
                <div class="param">
                    <span class="param-label">Lights<span data-info></span></span>
                    <input type="file" name="lights" accept=".fits,.fit,.fts" multiple required>
                </div>
                <div class="param">
                    <span class="param-label">Darks<span data-info></span></span>
                    <input type="file" name="darks" accept=".fits,.fit,.fts" multiple>
                </div>
                <div class="param">
                    <span class="param-label">Bias<span data-info></span></span>
                    <input type="file" name="bias" accept=".fits,.fit,.fts" multiple>
                </div>
                <div class="param">
                    <span class="param-label">Flats<span data-info></span></span>
                    <input type="file" name="flats" accept=".fits,.fit,.fts" multiple>
                </div>
            </form>
            <button id="upload" class="run-button" type="button">Upload Frames</button>
        </div>
        <div class="preview">
            <h2>Preview</h2>
            <div id="preview" class="preview-pane"></div>
            <pre id="result" class="result"></pre>
        </div>
    </div>
    <script type="module" src="{{ url_for('static', filename='js/upload-page.js') }}"></script>
</body>
</html>
